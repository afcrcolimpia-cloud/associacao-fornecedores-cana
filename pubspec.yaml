name: gestao_cana_app
description: Sistema de Gestão de Cana-de-açúcar - AFCRC Catanduva
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  # Supabase (APENAS ESTE)
  supabase_flutter: ^2.5.6

  # HTTP (opcional, mas OK manter)
  http: 1.6.0

  # UI
  cupertino_icons: ^1.0.2
  fl_chart: ^1.1.1
  table_calendar: ^3.2.0
  google_fonts: ^6.0.0

  # PDF e Relatórios
  pdf: ^3.10.0
  printing: ^5.11.0
  path_provider: ^2.0.0

  # Utilidades
  intl: ^0.20.2
  file_picker: ^8.0.0
  url_launcher: ^6.1.10
  path: ^1.9.0
  uuid: ^4.0.0  # ✅ ADICIONADO - Necessário para gerar IDs únicos
  dropdown_search: ^6.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/logo/
    - assets/icons/