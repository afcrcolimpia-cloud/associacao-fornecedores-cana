name: afcrc_app
description: Sistema de Gestão Agrícola - AFCRC Catanduva
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0' # Compatível com Dart 3.5+ (Firebase moderno)

dependencies:
  flutter:
    sdk: flutter

  # 🔥 Firebase (versões compatíveis entre si)
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.0
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.2.0

  # 🔑 Login com Google
  google_sign_in: ^6.2.1

  # 📦 Arquivos e compartilhamento
  file_picker: ^8.1.2
  path_provider: ^2.1.4
  share_plus: ^10.0.2
  url_launcher: ^6.3.1

  # 🌍 Internacionalização e ícones
  intl: ^0.19.0
  cupertino_icons: ^1.0.8

  # 📊 Gráficos
  fl_chart: ^0.69.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/logo/logo.png
    - assets/icons/google.png