name: gestao_cana_app
description: Sistema de Gestão de Cana-de-açúcar - AFCRC Catanduva
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  # Supabase (APENAS ESTE)
  supabase_flutter: ^2.5.6

  # HTTP (opcional, mas OK manter)
  http: ^0.13.6

  # UI
  cupertino_icons: ^1.0.2
  fl_chart: ^0.66.0
  table_calendar: ^3.2.0

  # Utilidades
  intl: ^0.20.2
  file_picker: ^8.0.0
  url_launcher: ^6.1.10
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/logo/
    - assets/icons/
